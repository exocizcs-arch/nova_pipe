version: '3.8'

services:
  # ==========================================
  # 1. ORCHESTRATION LAYER
  # ==========================================
  prefect-server:
    image: prefecthq/prefect:3-python3.13
    container_name: prefect-server
    restart: always
    command: prefect server start --host 0.0.0.0
    env_file:
      - .env
    volumes:
      - ./data/prefect_data:/root/.prefect
    ports:
      - "4200:4200"
    deploy:
      resources:
        limits:
          memory: 600M
    networks:
      - novapipe

  prefect-worker:
    build:
      context: ./prefect
      dockerfile: Dockerfile
    depends_on:
      - prefect-server
    container_name: prefect-worker
    restart: always
    volumes:
      - ./data/general_data:/data
      - ./prefect/pipeline:/app/pipeline
    env_file:
      - .env
    command: prefect worker start --pool 'default-agent-pool'
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - novapipe

  # ==========================================
  # 2. INGESTION LAYER (Real-time & Batch)
  # ==========================================
  webhook-ingestion:
    image: python:3.11-slim
    container_name: webhook-ingestion
    restart: always
    command: >
      bash -c "pip install fastapi uvicorn fastparquet pandas yfinance && uvicorn app:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data/general_data/landing_zone:/landing_zone
      - ./app/webhook:/app
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - novapipe

  python-extractor:
    build:
      context: ./prefect
      dockerfile: Dockerfile
    container_name: python-extractor
    volumes:
      - ./data/general_data:/data
      - ./prefect/pipeline:/app/pipeline
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - novapipe

  # ==========================================
  # 3. TRANSFORMATION LAYER
  # ==========================================
  dbt-transformer:
    image: python:3.11-slim
    container_name: dbt-transformer
    command: bash -c 'pip install dbt-duckdb && tail -f /dev/null'
    volumes:
      - ./dbt_project:/app/dbt_project
      - ./data:/app/data
    working_dir: /app/dbt_project
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    networks:
      - novapipe

  # ==========================================
  # 4. AUDIT & RECONCILIATION LAYER
  # ==========================================
  data-quality-auditor:
    image: python:3.11-slim
    container_name: data-quality-auditor
    command: >
      bash -c "pip install great_expectations duckdb && tail -f /dev/null"
    volumes:
      - ./data/general_data:/data
      - ./gx:/gx
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - novapipe

  # ==========================================
  # 5. VISUALIZATION LAYER
  # ==========================================
  visualization:
    image: python:3.11-slim
    container_name: visualization
    restart: always
    command: >
      bash -c "pip install streamlit duckdb pandas && streamlit run /app/dashboard.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./data/general_data:/data
      - ./app/streamlit:/app
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    networks:
      - novapipe

networks:
  novapipe:
    driver: bridge
