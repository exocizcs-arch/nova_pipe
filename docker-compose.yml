version: '3.8'

services:
  prefect-server:
    image: prefecthq/prefect:3-python3.13
    container_name: prefect-server
    restart: always
    command: prefect server start
    volumes:
      - ./data/prefect_data:/root/.prefect
    ports:
      - "4200:4200"
    environment:
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_URL=http://0.0.0.0:4200/api
    deploy:
      resources:
        limits:
          memory:
            600M
    networks:
      - novapipe
  
  prefect-worker:
    build:
      context: ./prefect
      dockerfile: Dockerfile
    depends_on:
      - prefect-server
    container_name: prefect-worker
    restart: always
    volumes:
      - ./data/general_data:/data
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    command: prefect worker start --pool 'default-agent-pool'
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - novapipe

volumes:
  prefect_data:
  general_data:

networks:
  novapipe:
